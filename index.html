<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>hamkke-walk</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #DCF2E8; }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #DCF2E8;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }

      #splash-logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
      }

      #splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1.9rem;
        font-weight: 800;
        color: #2D7D52;
        letter-spacing: -0.5px;
      }

      /* 발자국 걷기 애니메이션 */
      #splash-steps {
        position: relative;
        width: 56px;
        height: 72px;
      }
      .splash-step {
        position: absolute;
        width: 24px;
        height: 24px;
        object-fit: contain;
        opacity: 0;
        /* 게임 그린(#3DAE79) 변환 필터 */
        filter: brightness(0) invert(57%) sepia(42%) saturate(660%) hue-rotate(103deg) brightness(90%);
      }

      /* 좌발(1,3번): 왼쪽 오프셋, 좌측 기울기 */
      .splash-step:nth-child(1) { left: 0;   bottom: 0;    animation: stepL 2.1s ease-out infinite 0s; }
      .splash-step:nth-child(2) { right: 0;  bottom: 26px; animation: stepR 2.1s ease-out infinite 0.55s; }
      .splash-step:nth-child(3) { left: 0;   bottom: 52px; animation: stepL 2.1s ease-out infinite 1.1s; }

      @keyframes stepL {
        0%        { opacity: 0;    transform: rotate(-12deg) scaleX(-1) scale(0.6); }
        10%       { opacity: 0.92; transform: rotate(-12deg) scaleX(-1) scale(1.06); }
        18%       { opacity: 0.88; transform: rotate(-12deg) scaleX(-1) scale(1); }
        65%       { opacity: 0.88; transform: rotate(-12deg) scaleX(-1) scale(1); }
        88%, 100% { opacity: 0;    transform: rotate(-12deg) scaleX(-1) scale(1); }
      }
      @keyframes stepR {
        0%        { opacity: 0;    transform: rotate(12deg) scale(0.6); }
        10%       { opacity: 0.92; transform: rotate(12deg) scale(1.06); }
        18%       { opacity: 0.88; transform: rotate(12deg) scale(1); }
        65%       { opacity: 0.88; transform: rotate(12deg) scale(1); }
        88%, 100% { opacity: 0;    transform: rotate(12deg) scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img id="splash-logo" src="/app_logo.png" alt="산책길 모험" />
      <div id="splash-title">산책길 모험</div>
      <div id="splash-steps">
        <img class="splash-step" src="/item-footprint.png" alt="" />
        <img class="splash-step" src="/item-footprint.png" alt="" />
        <img class="splash-step" src="/item-footprint.png" alt="" />
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
